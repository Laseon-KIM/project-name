<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1">
<title>라선 · 홈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/proto.css">
<style>
  .hero { padding: 12px 24px 20px; }
  .hero h1 { margin: 4px 0 0; font-size: 26px; letter-spacing: -0.03em; }
  .hero p { margin: 6px 0 0; font-size: 13.5px; color: var(--ink-2); }

  .card {
    margin: 0 24px 14px;
    padding: 20px;
    border-radius: 18px;
    background: linear-gradient(140deg, #5b6cff, #8b5bff);
    color: #fff;
  }
  .card h2 { margin: 0; font-size: 15px; font-weight: 600; }
  .card p { margin: 6px 0 0; font-size: 12.5px; opacity: 0.85; line-height: 1.5; }

  .section { padding: 6px 24px 20px; }
  .section h3 {
    margin: 0 0 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-2);
    letter-spacing: 0.02em;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-child { border-bottom: 0; }
  .row__icon {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: #f2f2f5;
    font-size: 16px;
    flex: none;
  }
  .row__body { flex: 1; min-width: 0; }
  .row__body strong { display: block; font-size: 14px; font-weight: 600; }
  .row__body span { font-size: 12px; color: var(--ink-2); }
  .row__arrow { color: #c9cad1; font-size: 13px; }
</style>
</head>
<body>

  <div class="status"></div>

  <div class="screen">
    <div class="hero">
      <h1>안녕하세요, 라선</h1>
      <p>이 화면부터 프로토타이핑을 시작하세요.</p>
    </div>

    <div class="card">
      <h2>시작 템플릿</h2>
      <p>상태바 · 탭바 · 홈 인디케이터는 공통 스타일(proto.css)에 이미 들어있어요. 본문만 채우면 됩니다.</p>
    </div>

    <div class="section">
      <h3>다음 단계</h3>

      <div class="row">
        <div class="row__icon">📄</div>
        <div class="row__body">
          <strong>화면 추가하기</strong>
          <span>laseon/ 폴더에 html 파일 만들기</span>
        </div>
        <div class="row__arrow">›</div>
      </div>

      <div class="row">
        <div class="row__icon">🔗</div>
        <div class="row__body">
          <strong>사이드바에 등록</strong>
          <span>assets/js/pages.js 에 한 줄 추가</span>
        </div>
        <div class="row__arrow">›</div>
      </div>

      <div class="row">
        <div class="row__icon">🚀</div>
        <div class="row__body">
          <strong>배포</strong>
          <span>main 에 push 하면 자동 반영</span>
        </div>
        <div class="row__arrow">›</div>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <button class="tabbar__item is-active"><span>⌂</span>홈</button>
    <button class="tabbar__item"><span>⌕</span>탐색</button>
    <button class="tabbar__item"><span>♡</span>저장</button>
    <button class="tabbar__item"><span>☺</span>프로필</button>
  </nav>

  <div class="home-indicator"></div>

  <script src="../assets/js/proto.js"></script>

</body>
</html>
