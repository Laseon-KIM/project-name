<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Prototypes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar__head">
      <div class="logo">
        <span class="logo__dot"></span>
        <span class="logo__text">Prototypes</span>
      </div>
      <p class="logo__sub">393 × 852 · iPhone</p>
    </div>

    <nav class="tree" id="tree" aria-label="프로토타입 목록"></nav>

    <div class="sidebar__foot">
      <a href="https://github.com" target="_blank" rel="noopener" id="repoLink">GitHub</a>
    </div>
  </aside>

  <main class="canvas">
    <header class="toolbar">
      <div class="toolbar__title">
        <strong id="crumbOwner">—</strong>
        <span class="toolbar__sep">/</span>
        <span id="crumbPage">프로토타입을 선택하세요</span>
      </div>

      <div class="toolbar__actions">
        <label class="zoom">
          <span>배율</span>
          <select id="zoom">
            <option value="fit" selected>화면맞춤</option>
            <option value="1">100%</option>
            <option value="0.75">75%</option>
            <option value="0.5">50%</option>
          </select>
        </label>
        <button class="btn" id="reload" title="새로고침">↻</button>
        <a class="btn" id="openNew" title="새 창에서 열기" target="_blank" rel="noopener">↗</a>
      </div>
    </header>

    <div class="stage" id="stage">
      <div class="phone" id="phone">
        <div class="phone__btn phone__btn--silent"></div>
        <div class="phone__btn phone__btn--volup"></div>
        <div class="phone__btn phone__btn--voldown"></div>
        <div class="phone__btn phone__btn--power"></div>

        <div class="phone__frame">
          <div class="phone__screen">
            <iframe id="screen" title="프로토타입 미리보기"></iframe>
            <div class="phone__island"></div>
          </div>
        </div>
      </div>

      <div class="empty" id="empty">
        <p>왼쪽에서 프로토타입을 선택하세요</p>
      </div>
    </div>
  </main>

</div>

<script src="assets/js/pages.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
